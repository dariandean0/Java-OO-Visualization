<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Java OO Visualizer</title>
        <!--Load bootstrap 5 CSS stylesheet-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/darcula.min.css">

        <style>
            .CodeMirror{
                width: 100%;
                height: 100%;
            }
            
            /* Diagram Creator Styles */
            #diagramCanvas {
                border: 1px solid #ccc;
                background-color: white;
                cursor: crosshair;
                display: block;
            }
            
            /* ── Tool buttons ── */
            .tool-button {
                width: 100%;
                height: 40px;
                margin-bottom: 3px;
                border: 2px solid #dee2e6;
                background-color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 7px;
                padding: 0 8px;
                transition: all 0.2s;
                border-radius: 4px;
                font-size: 12px;
                text-align: left;
                white-space: nowrap;
                overflow: hidden;
            }

            .tool-button:hover {
                background-color: #e9ecef;
                border-color: #0d6efd;
            }

            .tool-button.active {
                background-color: #0d6efd;
                border-color: #0d6efd;
                color: white;
            }

            .tool-section-label {
                font-size: 9px;
                font-weight: 700;
                color: #6c757d;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                padding: 6px 2px 2px;
                margin-top: 4px;
                border-bottom: 1px solid #dee2e6;
                margin-bottom: 3px;
            }

            .left-toolbar {
                background-color: #f8f9fa;
                padding: 8px;
                border-right: 2px solid #dee2e6;
                height: 94vh;
                width: 155px;
                min-width: 155px;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }
            
            .canvas-container {
                overflow: auto;
                height: 94vh;
                background-color: #e9ecef;
            }
            
            .right-panel {
                height: 94vh;
                display: flex;
                flex-direction: column;
                background-color: #f8f9fa;
                border-left: 2px solid #dee2e6;
            }
            
            .property-editor {
                padding: 15px;
                border-bottom: 2px solid #dee2e6;
                flex: 0 0 auto;
                max-height: 50%;
                overflow-y: auto;
            }

            .dot-preview {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            
            .dot-preview-header {
                padding: 10px 15px;
                background-color: #e9ecef;
                border-bottom: 1px solid #dee2e6;
                font-weight: bold;
            }
            
            .dot-preview-content {
                flex: 1;
                overflow-y: auto;
                padding: 15px;
                background-color: #fff;
                font-family: 'Courier New', monospace;
                font-size: 13px;
                white-space: pre;
            }

            .page { display: none; }
            .pactive { display: block; }
        </style>
    </head>
    <body>
        <!-- Navbar -->
        <nav class="navbar" style="background-color: #0d1a2d;" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand me-4"><strong>Java OO Visualizer</strong></a>
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <form>
                        <button id="VisualizerB" type="button" onclick="goTo('Visualizer')" class="btn btn-primary me-2 pagebutton">Main Visualizer</button>
                        <button id="CreatorB" type="button" onclick="goTo('Creator')" class="btn btn-outline-primary me-2 pagebutton">Diagram Creator</button>
                        <button id="ComparerB" type="button" onclick="goTo('Comparer')" class="btn btn-outline-primary pagebutton">Diagram Comparer</button>
                        
                    </form>
                </ul>
                <button id="Export" type="button" onclick="exp()" class="btn btn-outline-success pagebutton ms-auto">Share</button>
            </div>
        </nav>
        <!--Pages-->
        <script>
            function goTo(page){
                document.querySelectorAll('.page').forEach(p => p.classList.remove('pactive'));
                document.getElementById(page).classList.add('pactive');

                document.querySelectorAll('.pagebutton').forEach(pb => {
                    pb.classList.remove('btn-primary', 'btn-outline-primary');
                    if (pb.id !== page + "B") {
                        pb.classList.add('btn-outline-primary');
                    } else {
                        pb.classList.add('btn-primary');
                    }
                });
            }
            function encodeCode(code) {
                return encodeURIComponent(pako.deflate(code).toBase64({ alphabet: "base64", omitPadding: true }))
            }
            function decodeCode(code) {
                return pako.inflate(Uint8Array.fromBase64(decodeURIComponent(code)), { to: "string" })
            }
            function exp() {
                var code = encodeCode(getEditorContent())
                var url = location.origin + location.pathname + "?code=" + code
                navigator.clipboard.writeText(url)
                alert("Copied URL!")
            }
        </script>

        <!--Import WASM-->
        <script type="module">
            import Module from '../wasm/backend.js';
            import * as Viz from 'https://cdn.jsdelivr.net/npm/@viz-js/viz@3.20.0/+esm'

            (async () => {
                const mod = await Module();

                const wasmExecFlowGen = mod.cwrap(
                    'wasm_execution_flow_gen',
                    'string',
                    ['string']
                );

                const wasmNoFlowGen = mod.cwrap(
                    'wasm_no_flow_gen',
                    'string',
                    ['string']
                );

                const wasmVisualizeJavaCode = mod.cwrap(
                    'wasm_visualize_java_code',
                    'string',
                    ['string']
                );


                //VizJS live update

                function debounce(fn, delay){
                    var timeout;
                    return (...args) => {
                        clearTimeout(timeout);
                        timeout = setTimeout(() => fn(...args), delay);
                    };
                }

                async function update(){https://dariandean0.github.io/Java-OO-Visualization/frontend/
                    var dotCode = wasmVisualizeJavaCode(getEditorContent())
                
                    Viz.instance().then(viz => {
                        const svg = viz.renderSVGElement(dotCode);
                        document.getElementById('Graph').innerHTML = "<div class='p-2 fw-bold' style='background-color: #DDDDDD;'>Memory Diagram</div>";
                        document.getElementById('Graph').appendChild(svg);
                    });
                }

                const debouncedUpdate = debounce(update, 500);

                EDITOR.on("change", debouncedUpdate);

                //const generateButton = document.getElementById("generate")
                //generateButton.addEventListener("click", async () => {
                //    var dotCode = wasmVisualizeJavaCode(getEditorContent())
                //    console.log(dotCode);
                //
                //    Viz.instance().then(viz => {
                //    const svg = viz.renderSVGElement(dotCode);
                //    document.getElementById('Graph').innerHTML = "<div class='p-2 fw-bold' style='background-color: #DDDDDD;'>Memory Diagram</div>";
                //    document.getElementById('Graph').appendChild(svg);
                //});
                //})
            })();
        </script>

        <div id="Visualizer" class="page pactive">
            <!-- Code Editor & Diagram -->
            <div class="container-fluid">
                <div class="row" style="height:94vh;">
                    <!--Code editor-->
                    <div class="col-6 d-flex flex-column" style="background-color: #FFFFFF; margin:0; padding:0;">
                        <div class="p-2 fw-bold" style="background-color: #DDDDDD;">Java Code Editor</div>
                            <textarea id="codeArea">public static void main(String[] args) {}</textarea>
                    
                            <!--Add codemirror-->
                            <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
                            <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/clike/clike.min.js"></script>
                            <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
                            <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
                            <script>
                                const CODE_AREA = document.getElementById('codeArea')
                                const EDITOR = CodeMirror.fromTextArea(CODE_AREA, {
                                    mode: "text/x-java",
                                    theme: "default",
                                    lineNumbers: true,
                                    indentUnit: 4,
                                    tabSize: 4,
                                    lineWrapping: true,
                                    matchBrackets: true,
                                    autoCloseBrackets: true,
                                });

                                function getEditorContent() {
                                    return EDITOR.getValue();
                                }
                            </script>
                        </div>
                    <!--Diagram-->
                    <div id="Graph" class="col-6 d-flex flex-column" style="background-color: #FAFAFA; margin:0; padding:0;">
                        <div class="p-2 fw-bold" style="background-color: #DDDDDD;">Memory Diagram</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="Creator" class="page">
            <div class="container-fluid p-0">
                <div class="row g-0">
                    <!-- Left Toolbar -->
                    <div class="col-auto left-toolbar">
                        <div class="d-flex flex-column w-100">

                            <!-- ── Tools ── -->
                            <div class="tool-section-label">Tools</div>
                            <button class="tool-button active" data-tool="select" title="Select / Move">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M4 2l17 10-7 2-3 7z"/>
                                </svg>
                                Select
                            </button>

                            <!-- ── Nodes ── -->
                            <div class="tool-section-label">Nodes</div>

                            <button class="tool-button" data-tool="class" title="Class — drag to size, double-click to name">
                                <!-- rect with header bar -->
                                <svg width="22" height="16" viewBox="0 0 22 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="1" y="1" width="20" height="14" rx="1" fill="#f0f0f0"/>
                                    <rect x="1" y="1" width="20" height="5" rx="1" fill="#add8e6"/>
                                    <line x1="1" y1="6" x2="21" y2="6"/>
                                </svg>
                                Class
                            </button>

                            <button class="tool-button" data-tool="interface" title="Interface — drag to size, double-click to name">
                                <svg width="22" height="16" viewBox="0 0 22 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2">
                                    <rect x="1" y="1" width="20" height="14" rx="1" fill="#f5f8ff"/>
                                    <rect x="1" y="1" width="20" height="5" rx="1" fill="#c4deff"/>
                                    <line x1="1" y1="6" x2="21" y2="6" stroke-dasharray="none"/>
                                </svg>
                                Interface
                            </button>

                            <button class="tool-button" data-tool="field" title="Field node — draw INSIDE a class box">
                                <!-- note shape -->
                                <svg width="22" height="14" viewBox="0 0 22 14" fill="#ffffe0" stroke="currentColor" stroke-width="1.5">
                                    <path d="M1 1h17l3 3v9H1z"/>
                                    <path d="M18 1v3h3" fill="none"/>
                                </svg>
                                Field
                            </button>

                            <button class="tool-button" data-tool="class-header" title="Class Header — the ellipse node (ClassName_class) in the DOT">
                                <!-- ellipse -->
                                <svg width="22" height="14" viewBox="0 0 22 14" fill="#add8e6" stroke="currentColor" stroke-width="1.5">
                                    <ellipse cx="11" cy="7" rx="10" ry="6"/>
                                </svg>
                                Class Header
                            </button>

                            <button class="tool-button" data-tool="method-public" title="Public method — draw INSIDE a class box">
                                <!-- component shape, green -->
                                <svg width="22" height="14" viewBox="0 0 22 14" fill="#90ee90" stroke="currentColor" stroke-width="1.5">
                                    <rect x="4" y="1" width="17" height="12" rx="1"/>
                                    <rect x="1" y="3" width="3" height="3" fill="#90ee90"/>
                                    <rect x="1" y="8" width="3" height="3" fill="#90ee90"/>
                                </svg>
                                Public Method
                            </button>

                            <button class="tool-button" data-tool="method-private" title="Private method — draw INSIDE a class box">
                                <svg width="22" height="14" viewBox="0 0 22 14" fill="#f08080" stroke="currentColor" stroke-width="1.5">
                                    <rect x="4" y="1" width="17" height="12" rx="1"/>
                                    <rect x="1" y="3" width="3" height="3" fill="#f08080"/>
                                    <rect x="1" y="8" width="3" height="3" fill="#f08080"/>
                                </svg>
                                Private Method
                            </button>

                            <button class="tool-button" data-tool="method-protected" title="Protected method — draw INSIDE a class box">
                                <svg width="22" height="14" viewBox="0 0 22 14" fill="#d3d3d3" stroke="currentColor" stroke-width="1.5">
                                    <rect x="4" y="1" width="17" height="12" rx="1"/>
                                    <rect x="1" y="3" width="3" height="3" fill="#d3d3d3"/>
                                    <rect x="1" y="8" width="3" height="3" fill="#d3d3d3"/>
                                </svg>
                                Protected Method
                            </button>

                            <!-- ── Connections ── -->
                            <div class="tool-section-label">Connections</div>

                            <button class="tool-button" data-tool="extends" title="Extends — solid line, hollow arrowhead">
                                <!-- solid line + hollow triangle -->
                                <svg width="28" height="12" viewBox="0 0 28 12">
                                    <line x1="0" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="2"/>
                                    <polygon points="18,2 28,6 18,10" fill="white" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                                Extends
                            </button>

                            <button class="tool-button" data-tool="implements" title="Implements — dashed line, hollow arrowhead">
                                <svg width="28" height="12" viewBox="0 0 28 12">
                                    <line x1="0" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="2" stroke-dasharray="4,3"/>
                                    <polygon points="18,2 28,6 18,10" fill="white" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                                Implements
                            </button>

                            <button class="tool-button" data-tool="calls" title="Method call — solid blue arrow">
                                <svg width="28" height="12" viewBox="0 0 28 12">
                                    <line x1="0" y1="6" x2="18" y2="6" stroke="#0000cd" stroke-width="2"/>
                                    <polygon points="18,2 28,6 18,10" fill="#0000cd" stroke="#0000cd"/>
                                </svg>
                                Method Call
                            </button>

                            <button class="tool-button" data-tool="member-link" title="Member Link — dashed line, no arrowhead (class header → field/method)">
                                <svg width="28" height="12" viewBox="0 0 28 12">
                                    <line x1="0" y1="6" x2="28" y2="6" stroke="currentColor" stroke-width="2" stroke-dasharray="5,3"/>
                                </svg>
                                Member Link
                            </button>

                            <!-- ── Actions ── -->
                            <div class="tool-section-label" style="margin-top:auto;">Actions</div>
                            <button class="btn btn-sm btn-danger w-100 mb-1" onclick="clearCanvas()">Clear Canvas</button>
                            <button class="btn btn-sm btn-success w-100" onclick="exportToDOT()">Export DOT</button>

                        </div>
                    </div>
                    
                    <!-- Center Canvas -->
                    <div class="col canvas-container">
                        <canvas id="diagramCanvas" width="2000" height="2000"></canvas>
                    </div>
                    <!-- Right Panel -->
                    <div class="col-3 right-panel">
                        <!-- Property Editor -->
                        <div class="property-editor">
                            <h6 class="mb-3">Node Properties</h6>
                            <div id="propertyEditorContent">
                                <p class="text-muted"><small>Select a shape to edit its properties</small></p>
                            </div>
                        </div>
                        <!-- DOT Preview -->
                        <div class="dot-preview">
                            <div class="dot-preview-header">DOT Preview</div>
                            <div class="dot-preview-content" id="dotPreview">digraph G {
    node [shape=record];
    rankdir=TB;
}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="diagram-comparer-view" class="view">
  <div style="padding: 8px 12px; font-weight: bold; font-size: 20px;">
    Diagram Comparer
  </div>

  <div
    style="
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
      padding: 12px;
      height: calc(100% - 40px);
      box-sizing: border-box;
    "
  >
    <!-- Left: Java code + controls -->
    <div style="display: flex; flex-direction: column;">
      <label style="font-weight: bold; margin-bottom: 4px;">
        Java Code
      </label>
      <textarea
        id="dc-source-code"
        placeholder="Paste the Java code you want to check against the diagram..."
        style="
          flex: 1;
          width: 100%;
          resize: none;
          font-family: monospace;
          font-size: 14px;
          padding: 8px;
          border-radius: 4px;
          border: 1px solid #ccc;
          box-sizing: border-box;
        "
      ></textarea>

      <div style="margin-top: 8px; display: flex; gap: 8px; align-items: center;">
        <button
          id="dc-check-button"
          style="
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
          "
        >
          Check Diagram
        </button>

       
      </div>

      <div
        id="dc-error"
        style="margin-top: 8px; color: red; font-size: 13px; display: none;"
      ></div>
    </div>

    <!-- Right: Mistakes list -->
    <div
      style="
        display: flex;
        flex-direction: column;
        border-left: 1px solid #ddd;
        padding-left: 12px;
        overflow-y: auto;
      "
    >
      <div style="font-weight: bold; margin-bottom: 4px;">Mistakes</div>

      <div
        id="dc-no-mistakes"
        style="font-size: 13px; color: #666;"
      >
        No mistakes to show yet. Enter code and click <strong>Check Diagram</strong>.
      </div>

      <ul
        id="dc-mistake-list"
        style="margin-top: 4px; padding-left: 18px;"
      ></ul>
    </div>
  </div>
</div>

        <!--Pako-->
        <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

        <!--Diagram Creator Script-->
        <script src="diagram-creator.js"></script>

	    <script src="diagram-comparer.js"></script>

        <!--At end so it runs once everything is loaded-->
        <script>
            // update from URL input
            const urlParams = new URLSearchParams(window.location.search)
            const codeParam = urlParams.get('code')
            if (codeParam) {
                EDITOR.setValue(decodeCode(codeParam))
            }
        </script>
        
        <!--Bootstrap-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
